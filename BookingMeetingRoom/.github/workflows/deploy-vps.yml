name: Deploy to VPS

on:
  push:
    branches:
      - tan
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JAR
        run: |
          chmod +x mvnw
          ./mvnw -DskipTests clean package

      - name: Upload JAR to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: target/BookingMeetingRoom-0.0.1-SNAPSHOT.jar
          target: /opt/apps/BookingMeetingRoom/target/
          overwrite: true

      - name: Restart booking service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            systemctl restart bookingmeetingroom
            systemctl is-active --quiet bookingmeetingroom
            systemctl status bookingmeetingroom --no-pager -l | head -n 20
