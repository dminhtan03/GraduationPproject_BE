<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation Force Cancelled</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: 10px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .reason {
            font-size: 16px;
            margin-bottom: 20px;
            color: #d9534f;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Reservation Force Cancelled</h1>
    <p class="greeting" th:text="'Hello ' + ${username} + ','"></p>
    <p>We regret to inform you that your meeting room reservation has been cancelled by the administrator.</p>
    <div class="reason">
        <strong>Reason for cancellation:</strong> <span th:text="${reason}"></span>
    </div>
    <p>If you have any questions, please contact support.</p>
</div>
</body>
</html>
