<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Reservation Status</title>
</head>
<body style="margin: 0; padding: 0; background-color: #e6ecf0; font-family: Arial, sans-serif;">
<table width="100%" height="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
        <td align="center" valign="middle">
            <table width="600" cellpadding="30" cellspacing="0" border="0" style="background-color: #ffffff; border: 1px solid #d0d0d0; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.1);">
                <tr>
                    <td style="text-align: center;">
                        <h2 style="color: #2a6cdf; margin-top: 0;">🛎️ Reservation Status Updated</h2>
                        <p style="font-size: 16px; color: #333333;">
                            Hello <b th:text="${username}">User</b>,
                        </p>
                        <p th:if="${activateCode != null}"
                           th:text="${activateCode}"
                           style="background-color: #f0f6ff; padding: 15px 20px; border-left: 4px solid #2a6cdf; border-radius: 6px; font-size: 14px; color: #1a1a1a; line-height: 1.6;">
                            Your reservation details will appear here.
                        </p>
                    </td>
                </tr>
                <tr>
                    <td style="text-align: center; padding-top: 30px;">
                        <p style="font-size: 12px; color: #888888;">
                            &copy; 2025 Telecommunication Team. All rights reserved.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
